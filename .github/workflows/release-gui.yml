name: Release GUI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-gui:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mindow-app/src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mindow-app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: mindow-app

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        run: cargo tauri build
        working-directory: mindow-app

      - name: Find bundle output
        run: |
          echo "=== Searching for .exe in bundle ==="
          Get-ChildItem -Path . -Recurse -Filter "*.exe" | Where-Object { $_.FullName -like "*bundle*" } | ForEach-Object { $_.FullName }
          echo "=== Searching for .msi in bundle ==="
          Get-ChildItem -Path . -Recurse -Filter "*.msi" | Where-Object { $_.FullName -like "*bundle*" } | ForEach-Object { $_.FullName }
        shell: pwsh

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: mindow-msi
          path: target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: mindow-nsis-setup
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          generate_release_notes: true
