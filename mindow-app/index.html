<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mindow</title>
    <!-- Anti-FOUC: match dark theme default to prevent white flash (Req 19.1) -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background-color: #1a1a1e;
        color: #e4e4e4;
        overflow: hidden;
      }
      #startup-placeholder {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #1a1a1e;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      #startup-placeholder.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #startup-placeholder .spinner {
        width: 24px;
        height: 24px;
        border: 2px solid #3d3d43;
        border-top-color: hsl(210, 85%, 65%);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Startup placeholder (Req 19.2) — fades out when React mounts -->
    <div id="startup-placeholder">
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
